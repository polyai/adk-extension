            };
            
            // Store for later restoration
            window.pendingConditionFormData = conditionFormData;
            
            closeConditionForm();
            // Show dialog with step type selector
            showCreateStepDialog('default_step', true);
        }
        
        function getSelectedRequiredEntities() {
            const checkboxes = document.querySelectorAll('#condition-required-entities input[type="checkbox"]:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }
        
        function restoreConditionFormWithNewStep(newStepName) {
            const formData = window.pendingConditionFormData;
            if (!formData) return;
            
            // Clear pending data
            window.pendingConditionFormData = undefined;
            
            // Set editing index
            window.editingConditionIndex = formData.editingIndex;
            
            // Show the condition form
            const dialog = document.getElementById('condition-form-dialog');
            const titleEl = document.getElementById('condition-form-title');
            
            titleEl.textContent = formData.editingIndex !== null ? 'Edit Condition' : 'Add Condition';
            
            // Restore form values
            document.getElementById('condition-form-name').value = formData.name || '';
            document.getElementById('condition-form-description').value = formData.description || '';
            document.getElementById('condition-form-type').value = formData.type || 'step_condition';
            
            // Update form state
            onConditionTypeChange();
            
            // Populate child step dropdown (will now include the new step)
            populateChildStepDropdown();
            
            // Set the new step as the selected target
            document.getElementById('condition-form-child-step').value = newStepName;
            
            // Restore required entities
            populateRequiredEntitiesCheckboxes(formData.requiredEntities || []);
            
            dialog.style.display = 'block';
        }

        function filterFunctions() {
            const searchInput = document.getElementById('function-search');
            const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
            
            if (!window.allFunctionsList) {
                return;
            }
            
            const filtered = window.allFunctionsList.filter(func => 
                func.name.toLowerCase().includes(searchTerm) ||
                func.description.toLowerCase().includes(searchTerm)
            );
            
            renderFunctionList(filtered);
        }

        function renderFunctionList(functions) {
            const functionList = document.getElementById('function-list');
            if (!functionList) {
                return;
            }
            
            if (functions.length === 0) {
                functionList.innerHTML = '<div style="padding: 10px; text-align: center; color: var(--vscode-descriptionForeground);">No functions found</div>';
                return;
            }
            
            functionList.innerHTML = functions.map(func => `
                <div class="function-item" onclick="insertFunction('{{${func.prefix}:${func.name}}}')">
                    <div class="function-name">${escapeHtml(func.name)}</div>
                    <div class="function-type">${func.type === 'global' ? 'Global Function' : 'Flow Function'}</div>
                    ${func.description ? `<div class="function-description">${escapeHtml(func.description)}</div>` : ''}
                </div>
            `).join('');
        }

        function insertFunction(functionText) {
            const promptInput = document.getElementById('edit-prompt');
            if (!promptInput) {
                return;
            }
            
            const start = promptInput.selectionStart;
            const end = promptInput.selectionEnd;
            const text = promptInput.value;
            
            // Insert function at cursor position
            const newText = text.substring(0, start) + functionText + text.substring(end);
            promptInput.value = newText;
            
            // Set cursor position after inserted text
            const newCursorPos = start + functionText.length;
            promptInput.setSelectionRange(newCursorPos, newCursorPos);
            promptInput.focus();
            
            // Close picker
            closeFunctionPicker();
        }

        function enablePromptEdit(nodeId, stepFilePath) {
            const promptDisplay = document.getElementById('prompt-display');
            const promptInput = document.getElementById('edit-prompt');
            const promptActions = document.getElementById('prompt-actions');
            
            if (promptDisplay && promptInput && promptActions) {
                // Always start with the original value from originalNodeData
                // This ensures we're comparing against the same baseline
                let currentPromptValue = '';
                if (originalNodeData) {
                    currentPromptValue = (originalNodeData.prompt || '').trim();
                } else {
                    // Fallback if originalNodeData not set
                    currentPromptValue = promptInput.value || (promptDisplay.textContent || promptDisplay.innerText || '').trim();
                }
                
                // If there are unsaved changes, use those instead (they represent actual edits)
                if (unsavedChanges[nodeId] && unsavedChanges[nodeId].prompt !== undefined) {
                    currentPromptValue = (unsavedChanges[nodeId].prompt || '').trim();
                }
                
                console.log('[enablePromptEdit] Entering edit mode for node:', nodeId);
                console.log('[enablePromptEdit] originalNodeData.prompt:', JSON.stringify(originalNodeData?.prompt || ''));
                console.log('[enablePromptEdit] originalNodeData.prompt (trimmed):', JSON.stringify((originalNodeData?.prompt || '').trim()));
                console.log('[enablePromptEdit] unsavedChanges prompt:', JSON.stringify(unsavedChanges[nodeId]?.prompt || ''));
                console.log('[enablePromptEdit] promptDisplay.textContent:', JSON.stringify(promptDisplay.textContent || ''));
                console.log('[enablePromptEdit] promptDisplay.textContent (trimmed):', JSON.stringify((promptDisplay.textContent || '').trim()));
                console.log('[enablePromptEdit] Setting textarea value to:', JSON.stringify(currentPromptValue));
                console.log('[enablePromptEdit] Value length:', currentPromptValue.length);
                
                // Set the textarea value to the current prompt
                promptInput.value = currentPromptValue;
                
                promptDisplay.style.display = 'none';
                promptInput.style.display = 'block';
                promptActions.style.display = 'block';
                promptInput.focus();
                // Store original value for cancel (use originalNodeData, normalized)
                const originalValue = (originalNodeData?.prompt || '').trim();
                promptInput.dataset.originalValue = originalValue;
                
                // Remove any existing listeners (both checkForChanges and handlePromptInput)
                // and add our wrapper function
                console.log('[enablePromptEdit] Removing old event listeners and adding new one');
                promptInput.removeEventListener('input', checkForChanges);
                promptInput.removeEventListener('input', handlePromptInput);
                promptInput.addEventListener('input', handlePromptInput);
                console.log('[enablePromptEdit] Event listener added');
                
                // Store the initial value to compare against
                promptInput.dataset.initialValue = currentPromptValue;
                console.log('[enablePromptEdit] ===== End enablePromptEdit =====\n');
                
                // Initialize custom keywords from the node
                const node = flowGraph.nodes.find(n => n.id === nodeId);
                if (node && node.step && node.step.asr_biasing && node.step.asr_biasing.custom_keywords) {
                    customKeywords = [...node.step.asr_biasing.custom_keywords];
                    updateCustomKeywordsDisplay();
                } else {
                    customKeywords = [];
                    updateCustomKeywordsDisplay();
                }
            }
        }
        
        // Wrapper function to only trigger checkForChanges if the value actually changed from original
        function handlePromptInput() {
            const promptInput = document.getElementById('edit-prompt');
            if (promptInput) {
                console.log('[handlePromptInput] Input event triggered');
                console.log('[handlePromptInput] Current value:', JSON.stringify(promptInput.value));
                console.log('[handlePromptInput] Current value (trimmed):', JSON.stringify(promptInput.value.trim()));
            }
            // Just call checkForChanges - it will properly compare against originalNodeData
            checkForChanges();
        }

        function donePromptEdit(nodeId) {
            const promptDisplay = document.getElementById('prompt-display');
            const promptInput = document.getElementById('edit-prompt');
            const promptActions = document.getElementById('prompt-actions');
            
            if (promptDisplay && promptInput && promptActions) {
                // Get current value and normalize it
                const currentPrompt = promptInput.value.trim();
                const originalPrompt = (originalNodeData?.prompt || '').trim();
                
                // Check if there were actual changes
                const hasActualChanges = currentPrompt !== originalPrompt;
                
                promptDisplay.innerHTML = promptTextToDisplayHtml(currentPrompt);
                promptDisplay.style.display = 'block';
                promptInput.style.display = 'none';
                promptActions.style.display = 'none';
                
                // If no actual changes were made, update originalNodeData to match current state
                // This prevents false positives when just entering/exiting edit mode
                if (!hasActualChanges && originalNodeData) {
                    originalNodeData.prompt = currentPrompt;
                    // Clear any unsaved changes for this node if there were none
                    if (unsavedChanges[currentNodeId]) {
                        const unsaved = unsavedChanges[currentNodeId];
                        // Only clear if prompt is the only thing that might have changed
                        const promptMatches = (unsaved.prompt || '').trim() === originalPrompt;
                        if (promptMatches) {
                            // Check if other fields also match
                            const asrMatches = JSON.stringify(unsaved.asrBiasing || {}) === JSON.stringify(originalNodeData.asrBiasing || {});
                            const dtmfMatches = JSON.stringify(unsaved.dtmfConfig || {}) === JSON.stringify(originalNodeData.dtmfConfig || {});
                            if (asrMatches && dtmfMatches) {
                                delete unsavedChanges[currentNodeId];
                                removeModifiedNode(currentNodeId);
                            }
                        }
                    }
                }
                
                // Check for changes after exiting edit mode
                checkForChanges();
            }
        }

        function cancelPromptEdit(nodeId) {
            const promptDisplay = document.getElementById('prompt-display');
            const promptInput = document.getElementById('edit-prompt');
            const promptActions = document.getElementById('prompt-actions');
            
            if (promptDisplay && promptInput && promptActions) {
                // Restore original value and re-parse for display
                promptInput.value = promptInput.dataset.originalValue || '';
                const originalPrompt = promptInput.value;
                promptDisplay.innerHTML = promptTextToDisplayHtml(originalPrompt);
                promptDisplay.style.display = 'block';
                promptInput.style.display = 'none';
                promptActions.style.display = 'none';
            }
        }

        let customKeywords = [];

        function addCustomKeyword(event) {
            const input = event.target;
            const keyword = input.value.trim();
            if (keyword && !customKeywords.includes(keyword)) {
                customKeywords.push(keyword);
                updateCustomKeywordsDisplay();
                input.value = '';
            }
        }

        function removeCustomKeyword(keyword) {
            checkForChanges();
            customKeywords = customKeywords.filter(k => k !== keyword);
            updateCustomKeywordsDisplay();
        }

        function updateCustomKeywordsDisplay() {
            const list = document.getElementById('custom-keywords-list');
            if (list) {
                list.innerHTML = customKeywords.map(keyword => `
                    <span style="background-color: var(--vscode-badge-background); color: var(--vscode-badge-foreground); padding: 3px 8px; border-radius: 3px; display: flex; align-items: center;">
                        ${escapeHtml(keyword)}
                        <span onclick="removeCustomKeyword('${escapeHtml(keyword)}')" style="margin-left: 5px; cursor: pointer; font-weight: bold;">×</span>
                    </span>
                `).join('');
            }
            checkForChanges();
        }

        function saveStep(nodeId, stepFilePath) {
            // Get prompt value - check if we're in edit mode or display mode
            const promptInput = document.getElementById('edit-prompt');
            const promptDisplay = document.getElementById('prompt-display');
            let prompt = '';
            
            if (promptInput && promptInput.style.display !== 'none') {
                // We're in edit mode, get from input
                prompt = promptInput.value.trim();
            } else if (promptDisplay) {
                // We're in display mode, get from display (strip HTML)
                prompt = promptDisplay.textContent || promptDisplay.innerText || '';
            }
            
            if (!stepFilePath) {
                console.error('No file path for step:', nodeId);
                return;
            }
            
            // Get the current node to check step type
            const currentNode = flowGraph?.nodes?.find(n => n.id === nodeId);
            const isDefaultStep = currentNode?.step?.step_type === 'default_step';
            
            // Collect ASR biasing data (only for non-default steps)
            let asrBiasing = null;
            if (!isDefaultStep) {
                asrBiasing = {
                    is_enabled: document.getElementById('asr-enabled')?.checked || false,
                    alphanumeric: document.getElementById('asr-alphanumeric')?.checked || false,
                    name_spelling: document.getElementById('asr-name_spelling')?.checked || false,
                    numeric: document.getElementById('asr-numeric')?.checked || false,
                    party_size: document.getElementById('asr-party_size')?.checked || false,
                    precise_date: document.getElementById('asr-precise_date')?.checked || false,
                    relative_date: document.getElementById('asr-relative_date')?.checked || false,
                    single_number: document.getElementById('asr-single_number')?.checked || false,
                    time: document.getElementById('asr-time')?.checked || false,
                    yes_no: document.getElementById('asr-yes_no')?.checked || false,
                    address: document.getElementById('asr-address')?.checked || false,
                    custom_keywords: customKeywords
                };
            }
            
            // Collect DTMF config data (only for non-default steps)
            let dtmfConfig = null;
            if (!isDefaultStep) {
                const endKeySelect = document.getElementById('dtmf-end_key');
                const endKeyValue = endKeySelect ? endKeySelect.value : '#';
                const isEnabled = document.getElementById('dtmf-enabled')?.checked || false;
                dtmfConfig = {
                    is_enabled: isEnabled,
                    inter_digit_timeout: isEnabled ? Math.max(3, parseInt(document.getElementById('dtmf-inter_digit_timeout')?.value || '3', 10)) : 3,
                    max_digits: isEnabled ? parseInt(document.getElementById('dtmf-max_digits')?.value || '0', 10) : 0,
                    end_key: isEnabled ? endKeyValue : "",
                    collect_while_agent_speaking: isEnabled ? (document.getElementById('dtmf-collect_while_agent_speaking')?.checked || false) : false,
                    is_pii: isEnabled ? (document.getElementById('dtmf-is_pii')?.checked || false) : false
                };
            }
            
            // Collect extracted entities (for default_step only)
            const extractedEntities = isDefaultStep && window.currentExtractedEntities ? [...window.currentExtractedEntities] : null;
            
            // Collect conditions (for default_step only)
            const conditions = isDefaultStep && window.currentConditions ? JSON.parse(JSON.stringify(window.currentConditions)) : null;
            
            vscode.postMessage({
                command: 'saveStep',
                stepFilePath: stepFilePath,
                prompt: prompt,
                asrBiasing: asrBiasing,
                dtmfConfig: dtmfConfig,
                extractedEntities: extractedEntities,
                conditions: conditions,
                nodeId: nodeId,
                isDefaultStep: isDefaultStep
            });
            
            // Update display with clickable links if we were in edit mode
            if (promptInput && promptInput.style.display !== 'none' && promptDisplay) {
                promptDisplay.innerHTML = promptTextToDisplayHtml(prompt);
                promptDisplay.style.display = 'block';
                promptInput.style.display = 'none';
                const promptActions = document.getElementById('prompt-actions');
                if (promptActions) {
                    promptActions.style.display = 'none';
                }
            }
            
            // Check for changes after save (should be none, but update the bar)
            setTimeout(() => {
                checkForChanges();
            }, 100);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /** Convert raw prompt text to display HTML with clickable {{entity:}}, {{attr:}}, {{fn:}}, {{ft:}} and styled {{vrbl:}}. */
        function promptTextToDisplayHtml(promptText) {
            if (promptText == null) promptText = '';
            var html = escapeHtml(promptText);
            html = html.replace(/\{\{fn:(\w+)\}\}((\([^)]*\))?)/g, function(match, funcName, parentheses) {
                var func = flowGraph && flowGraph.globalFunctions && flowGraph.globalFunctions.find(function(f) { return f.name === funcName; });
                if (func && func.filePath) {
                    return '<a href="#" class="function-link" data-type="global" data-path="' + escapeHtml(func.filePath) + '" onclick="openFunction(\'' + escapeHtml(func.filePath).replace(/'/g, "\\'") + '\'); return false;">{{fn:' + funcName + '}}' + (parentheses || '') + '</a>';
                }
                return match;
            });
            html = html.replace(/\{\{ft:(\w+)\}\}/g, function(match, funcName) {
                var func = flowGraph && flowGraph.flowFunctions && flowGraph.flowFunctions.find(function(f) { return f.name === funcName; });
                if (func && func.filePath) {
                    return '<a href="#" class="function-link" data-type="flow" data-path="' + escapeHtml(func.filePath) + '" onclick="openFunction(\'' + escapeHtml(func.filePath).replace(/'/g, "\\'") + '\'); return false;">{{ft:' + funcName + '}}</a>';
                }
                return match;
            });
            html = html.replace(/\{\{entity:([^}]+)\}\}/g, function(match, name) {
                var safeName = escapeHtml(name);
                return '<a href="#" class="reference-badge entity-ref" title="Entity: ' + safeName + '" data-entity="' + safeName + '" onclick="openEntityInPanelFromEl(this); return false;">{{entity:' + safeName + '}}</a>';
            });
            html = html.replace(/\{\{attr:([^}]+)\}\}/g, function(match, name) {
                var safeName = escapeHtml(name);
                return '<a href="#" class="reference-badge attr-ref" title="Attribute: ' + safeName + '" data-attribute="' + safeName + '" onclick="openAttributeInPanelFromEl(this); return false;">{{attr:' + safeName + '}}</a>';
            });
            html = html.replace(/\{\{vrbl:([^}]+)\}\}/g, function(match, name) {
                var safeName = escapeHtml(name);
                return '<span class="reference-badge vrbl-ref" title="Variable: ' + safeName + '">{{vrbl:' + safeName + '}}</span>';
            });
            return html;
        }

        // Converts a string to snake_case
        function toSnakeCase(str) {
            return str
                .replace(/([a-z])([A-Z])/g, '$1_$2')  // camelCase -> camel_Case
                .replace(/([A-Z]+)([A-Z][a-z])/g, '$1_$2')  // XMLParser -> XML_Parser
                .replace(/[\s\-]+/g, '_')  // spaces and hyphens to underscores
                .replace(/[^a-zA-Z0-9_]/g, '')  // remove non-alphanumeric (except underscores)
                .replace(/_+/g, '_')  // collapse multiple underscores
                .replace(/^_|_$/g, '')  // trim leading/trailing underscores
                .toLowerCase();
        }

        function closeDetails() {
            // Save current state before closing
            saveCurrentState();
            
            const panel = document.getElementById('details-panel');
            panel.classList.remove('visible');
        }

        function fitNetwork() {
            fitToViewport(true);
        }

        function focusStartNode() {
            if (flowGraph) {
                const startStepId = flowGraph.config && flowGraph.config.start_step;
                const node = startStepId ? flowGraph.nodes.find(n => n.id === startStepId) : null;
                if (node) {
                    selectedNodeId = node.id;
                    highlightNode(node.id);
                    showDetails(node);
                    scrollToNode(node.id);
                }
            }
        }

        function clearSelection() {
            selectedNodeId = null;
            clearHighlights();
        }

        // Clear selection on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                clearSelection();
                closeDetails();
            }
        });


        function highlightNode(nodeId) {
            clearHighlights();
            if (!nodeId) return;
            var el = jointElements.get(nodeId);
            if (el) {
                el.attr('body/stroke', Theme.SelectionColor);
                el.attr('body/strokeWidth', 2.5);
            }
        }

        function focusNode(nodeId) {
            if (!flowGraph || !nodeId) return;
            var node = flowGraph.nodes.find(function(n) { return n.id === nodeId; });
            if (node) {
                selectedNodeId = nodeId;
                highlightNode(nodeId);
                showDetails(node);
                scrollToNode(nodeId);
            }
        }

        function highlightConnectedNodes(nodeId) {
        }

        function clearHighlights() {
            jointElements.forEach(function(el, nodeId) {
                if (!flowGraph) return;
                var node = flowGraph.nodes.find(function(n) { return n.id === nodeId; });
                if (!node) return;
                var colors = getNodeColor(node.type);
                el.attr('body/stroke', colors.stroke);
                el.attr('body/strokeWidth', Theme.NodeBorderWidth);
                el.removeAttr('body/filter');
                var view = jointPaper ? jointPaper.findViewByModel(el) : null;
                if (view) view.el.style.opacity = '';
            });
        }

        function filterNodes() {
            var searchBox = document.getElementById('search-box');
            var rawValue = searchBox ? searchBox.value : '';
            var searchTerm = (rawValue || '').replace(/^["']|["']$/g, '').trim().toLowerCase();
            if (!flowGraph || !jointPaper) return;

            if (searchTerm === '') {
                jointElements.forEach(function(el) {
                    var view = jointPaper.findViewByModel(el);
                    if (view) view.el.style.opacity = '';
                });
                return;
            }

            flowGraph.nodes.forEach(function(flowNode) {
                var el = jointElements.get(flowNode.id);
                if (!el) return;
                var view = jointPaper.findViewByModel(el);
                if (!view) return;
                var matches = flowNode.label.toLowerCase().includes(searchTerm) ||
                    (flowNode.details && flowNode.details.toLowerCase().includes(searchTerm));
                view.el.style.opacity = matches ? '' : '0.2';
            });
        }

        function updateStats() {
            if (flowGraph) {
                const statsEl = document.getElementById('stats');
                const stepCount = flowGraph.nodes.filter(n => n.type === 'step' || n.type === 'no-code-step' || n.type === 'function-step').length;
                const funcCount = flowGraph.nodes.filter(n => n.type === 'function').length;
                const edgeCount = flowGraph.edges.length;
                const entityCount = flowGraph.entities ? flowGraph.entities.length : 0;
                statsEl.textContent = `${stepCount} steps, ${funcCount} functions, ${entityCount} entities, ${edgeCount} connections`;
            }
        }

        function initJointAndReady() {
            if (typeof joint !== 'undefined' && joint.layout && joint.layout.DirectedGraph) {
                vscode.postMessage({ command: 'ready' });
            } else if (typeof joint !== 'undefined') {
                setTimeout(initJointAndReady, 50);
            } else {
                setTimeout(initJointAndReady, 100);
            }
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initJointAndReady);
        } else {
            initJointAndReady();
        }
        document.addEventListener('DOMContentLoaded', () => {
            const searchBox = document.getElementById('search-box');
            console.log('[search] DOMContentLoaded', { searchBoxFound: !!searchBox, searchBoxId: searchBox ? searchBox.id : null });
            if (searchBox) {
                searchBox.addEventListener('input', () => { console.log('[search] input event'); filterNodes(); });
                searchBox.addEventListener('keyup', () => { console.log('[search] keyup event'); filterNodes(); });
                searchBox.addEventListener('paste', () => { console.log('[search] paste event'); setTimeout(filterNodes, 0); });
                console.log('[search] listeners attached to #search-box');
            } else {
                console.warn('[search] #search-box not found, search will not work');
            }
            
            // Delegated click handler for entity links
            document.addEventListener('click', (e) => {
                const entityLink = e.target.closest('.entity-link');
                if (entityLink) {
                    e.preventDefault();
                    e.stopPropagation();
                    const entityName = entityLink.dataset.entity;
                    console.log('[entity-link click] Entity:', entityName);
                    if (entityName) {
                        showEntityDetails(entityName);
                    }
                }
            });
        });
        
        // Initialize toolbar position on page load
        updateToolbarPosition();
    </script>
